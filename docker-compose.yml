services:
  mcp-swagger:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-swagger
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      TRANSPORT: streamable
      HTTP_ADDR: ":8080"
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
