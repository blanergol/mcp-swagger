openapi: 3.0.3
info:
  title: Payload Generation API
  version: 1.0.0
servers:
  - url: https://api.example.com
paths:
  /users:
    post:
      operationId: createUserPayload
      summary: Create user payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, role, age, contact]
              properties:
                name:
                  type: string
                  minLength: 3
                role:
                  type: string
                  enum: [admin, user]
                age:
                  type: integer
                  minimum: 18
                tags:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    minLength: 2
                contact:
                  oneOf:
                    - type: object
                      required: [email]
                      properties:
                        email:
                          type: string
                          format: email
                    - type: object
                      required: [phone]
                      properties:
                        phone:
                          type: string
                          minLength: 10
      responses:
        '201':
          description: Created
  /notes:
    post:
      operationId: createNotePayload
      summary: Create note payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  minLength: 5
                priority:
                  type: integer
                  minimum: 1
                  maximum: 5
              example:
                title: Example note title
                priority: 3
      responses:
        '201':
          description: Created
  /flags:
    post:
      operationId: setFlagPayload
      summary: Set flag payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: boolean
      responses:
        '200':
          description: OK
  /limits:
    post:
      operationId: setLimitPayload
      summary: Set limit payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 2
              items:
                type: integer
                minimum: 5
      responses:
        '200':
          description: OK
